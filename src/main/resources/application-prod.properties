# Railway Production Configuration (PostgreSQL)
# These variables are automatically injected by Railway when a PostgreSQL DB is added
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Railway persistent storage for uploads
app.upload.dir=/app/uploads

# Ensure the port is set by Railway
server.port=${PORT:8080}
