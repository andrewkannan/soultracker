# Railway Production Configuration (PostgreSQL)
# We will use the full Connection String for maximum reliability
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

# Driver settings
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update

# Railway persistent storage for uploads
app.upload.dir=/app/uploads

# Ensure the port is set by Railway
server.port=${PORT:8080}
