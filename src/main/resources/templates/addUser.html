<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add User - Reach.</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/x-icon" href="/favicon.png">
</head>

<body>
    <div class="glass-nav">
        <h3 style="margin: 0; font-weight: 700; letter-spacing: -0.02em;">Reach.</h3>
        <div class="nav-links">
            <a th:href="@{/users}" class="btn btn-secondary">All Users</a>
        </div>
    </div>

    <div class="container">
        <h2
            style="color: var(--text-main); margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; text-align: center;">
            Register Administrator / Evangelist</h2>

        <div class="glass-panel" style="max-width: 600px; margin: 0 auto;">
            <form th:action="@{/adduser}" th:object="${user}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" th:field="*{username}" required="required" placeholder="Unique login ID" />
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{fullName}" required="required" placeholder="First and Last Name" />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" th:field="*{email}" required="required" placeholder="name@domain.com" />
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" th:field="*{phoneNumber}" placeholder="+60123456789" />
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" required="required" placeholder="Secure password" />
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Branch</label>
                        <select th:field="*{branch}" required="required">
                            <option value="" disabled selected>Select a branch</option>
                            <option value="JB">JB</option>
                            <option value="IP">IP</option>
                            <option value="SR">SR</option>
                            <option value="MELAKA">MELAKA</option>
                            <option value="TD">TD</option>
                        </select>
                    </div>

                    <div class="form-group" style="margin-bottom: 2.5rem;">
                        <label>Role</label>
                        <select th:field="*{role}" required="required">
                            <option value="ROLE_EVANGELIST">Evangelist</option>
                            <option value="ROLE_ADMIN">Admin</option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn" style="flex: 2;"
                        onclick="if(navigator.vibrate) navigator.vibrate(20);">Create User</button>
                    <a th:href="@{/users}" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
