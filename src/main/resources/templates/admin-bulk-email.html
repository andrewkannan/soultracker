<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{admin-layout :: head('Bulk Email')}"></head>
<body class="admin-body">
    <div th:replace="~{admin-layout :: sidebar}"></div>
    
    <div class="admin-main">
        <div th:replace="~{admin-layout :: topbar}"></div>
        
        <h2>Send Bulk Email</h2>
        <p>Send an announcement to all registered users.</p>

        <div th:if="${successMsg != null}" style="background: rgba(48, 209, 88, 0.2); color: #30d158; padding: 1rem; border-radius: 12px; margin-bottom: 2rem;">
            <span th:text="${successMsg}"></span>
        </div>

        <div class="admin-form-container" style="max-width: 800px;">
            <form th:action="@{/admin/bulk-email/send}" method="post">
                <div class="form-group">
                    <label>Subject</label>
                    <input type="text" name="subject" required="required" />
                </div>

                <div class="form-group">
                    <label>Message Body (HTML Supported)</label>
                    <textarea name="body" rows="10" required="required"></textarea>
                </div>

                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn" style="background-color: #ff3b30; color: white;" onclick="return confirm('Are you sure you want to send this to all users?');">Send to All Users</button>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const userProfile = document.querySelector('.user-profile');
            if (userProfile) {
                userProfile.addEventListener('click', function (e) {
                    e.stopPropagation();
                    this.classList.toggle('active');
                });
            }
            document.addEventListener('click', function () {
                if (userProfile) userProfile.classList.remove('active');
            });
        });
    </script>
</body>
</html>
