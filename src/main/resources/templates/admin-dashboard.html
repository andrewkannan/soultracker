<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{admin-layout :: head('Dashboard')}"></head>
<body class="admin-body">
    <div th:replace="~{admin-layout :: sidebar}"></div>
    
    <div class="admin-main">
        <div th:replace="~{admin-layout :: topbar}"></div>
        
        <h2>Dashboard Overview</h2>
        
        <div class="grid-2">
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                </div>
                <div class="stat-number tabular-nums" th:text="${totalUsers}">0</div>
                <div class="stat-label">Total Users</div>
            </div>
            
            <div class="stat-card">
                <div class="stat-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                </div>
                <div class="stat-number tabular-nums" th:text="${totalEvents}">0</div>
                <div class="stat-label">Upcoming Events</div>
            </div>
        </div>
    </div>
    
    <script>
        // Dropdown toggle logic
        document.addEventListener("DOMContentLoaded", function () {
            const userProfile = document.querySelector('.user-profile');
            if (userProfile) {
                userProfile.addEventListener('click', function (e) {
                    e.stopPropagation();
                    this.classList.toggle('active');
                });
            }
            document.addEventListener('click', function () {
                if (userProfile) userProfile.classList.remove('active');
            });
        });
    </script>
</body>
</html>
