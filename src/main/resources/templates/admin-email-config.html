<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{admin-layout :: head('SMTP Setup')}"></head>
<body class="admin-body">
    <div th:replace="~{admin-layout :: sidebar}"></div>
    
    <div class="admin-main">
        <div th:replace="~{admin-layout :: topbar}"></div>
        
        <h2>SMTP Configuration</h2>
        <p>Set up your email provider (e.g. Zoho) so the system can send automated notifications and bulk emails.</p>

        <div th:if="${successMsg != null}" style="background: rgba(48, 209, 88, 0.2); color: #30d158; padding: 1rem; border-radius: 12px; margin-bottom: 2rem;">
            <span th:text="${successMsg}"></span>
        </div>

        <div class="admin-form-container" style="max-width: 600px;">
            <form th:action="@{/admin/email-config}" method="post">
                <input type="hidden" name="id" th:value="${config.id}" />

                <div class="form-group">
                    <label>SMTP Host</label>
                    <input type="text" name="host" th:value="${config.host}" placeholder="e.g. smtppro.zoho.com" required="required" />
                </div>

                <div class="form-group">
                    <label>SMTP Port</label>
                    <input type="number" name="port" th:value="${config.port}" placeholder="e.g. 465 or 587" required="required" />
                </div>

                <div class="form-group">
                    <label>Username (Email)</label>
                    <input type="email" name="username" th:value="${config.username}" placeholder="e.g. no-reply@zoho.com" required="required" />
                </div>

                <div class="form-group">
                    <label>Password (or App Password)</label>
                    <input type="password" name="password" th:value="${config.password}" placeholder="Enter password" required="required" />
                </div>

                <div class="form-group">
                    <label>Protocol</label>
                    <input type="text" name="protocol" th:value="${config.protocol != null ? config.protocol : 'smtp'}" required="required" />
                </div>

                <div class="grid-2">
                    <div class="form-group" style="display: flex; align-items: center; gap: 1rem;">
                        <label style="margin-bottom: 0;">Requires Auth</label>
                        <label class="switch">
                            <input type="checkbox" name="auth" th:checked="${config.auth}">
                            <span class="slider round"></span>
                        </label>
                    </div>
                    
                    <div class="form-group" style="display: flex; align-items: center; gap: 1rem;">
                        <label style="margin-bottom: 0;">Enable STARTTLS</label>
                        <label class="switch">
                            <input type="checkbox" name="starttls" th:checked="${config.starttls}">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn" style="width: 100%;">Save Configuration</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input[type="checkbox"] {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
        }
        input:checked + .slider {
            background-color: #30d158;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .slider.round {
            border-radius: 34px;
        }
        .slider.round:before {
            border-radius: 50%;
        }
    </style>
    
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const userProfile = document.querySelector('.user-profile');
            if (userProfile) {
                userProfile.addEventListener('click', function (e) {
                    e.stopPropagation();
                    this.classList.toggle('active');
                });
            }
            document.addEventListener('click', function () {
                if (userProfile) userProfile.classList.remove('active');
            });
        });
    </script>
</body>
</html>
