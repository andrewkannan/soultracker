<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{admin-layout :: head('Manage Events')}"></head>
<body class="admin-body">
    <div th:replace="~{admin-layout :: sidebar}"></div>
    
    <div class="admin-main">
        <div th:replace="~{admin-layout :: topbar}"></div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>Upcoming Events</h2>
            <button class="btn" onclick="openAddModal()">+ Add Event</button>
        </div>

        <div class="admin-table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Title</th>
                        <th>Date & Time</th>
                        <th>Location</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="event : ${events}">
                        <td th:text="${event.id}"></td>
                        <td th:text="${event.title}" style="font-weight: 500; color: var(--text-main);"></td>
                        <td th:text="${#temporals.format(event.eventDate, 'dd MMM yyyy, HH:mm')}"></td>
                        <td th:text="${event.location}"></td>
                        <td>
                            <form th:action="@{'/admin/events/delete/' + ${event.id}}" method="post" style="display:inline;">
                                <button type="submit" class="btn-secondary" style="font-size: 0.75rem; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid rgba(255,59,48,0.3); background: rgba(255,59,48,0.1); color: #ff3b30; cursor: pointer;" onclick="return confirm('Delete event?');">
                                    Delete
                                </button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(events)}">
                        <td colspan="5" style="text-align: center; color: var(--text-muted); padding: 2rem;">No upcoming events found.</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Add Event Modal -->
    <div id="addModal" class="modal">
        <div class="glass-panel" style="position: relative;">
            <button class="close-btn" onclick="closeAddModal()">&times;</button>
            <h2 style="color: var(--text-main); margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
                Add New Event</h2>

            <form th:action="@{/admin/events/add}" method="post">
                <div class="form-group">
                    <label>Event Title</label>
                    <input type="text" name="title" required="required" />
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Date & Time</label>
                        <input type="datetime-local" name="eventDate" required="required" />
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" name="location" required="required" />
                    </div>
                </div>

                <div class="form-group">
                    <label>Image URL (Optional)</label>
                    <input type="text" name="imageUrl" />
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea name="description" rows="4"></textarea>
                </div>

                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn" style="width: 100%;">Save Event</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const addModal = document.getElementById('addModal');

        function openAddModal() {
            addModal.style.display = "flex";
            setTimeout(() => { addModal.classList.add('show'); }, 10);
        }

        function closeAddModal() {
            addModal.classList.remove('show');
            setTimeout(() => { addModal.style.display = "none"; }, 300); 
        }

        window.onclick = function (event) {
            if (event.target == addModal) { closeAddModal(); }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const userProfile = document.querySelector('.user-profile');
            if (userProfile) {
                userProfile.addEventListener('click', function (e) {
                    e.stopPropagation();
                    this.classList.toggle('active');
                });
            }
            document.addEventListener('click', function () {
                if (userProfile) userProfile.classList.remove('active');
            });
        });
    </script>
</body>
</html>
