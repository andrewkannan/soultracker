<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">
<head th:replace="~{admin-layout :: head('Manage Users')}"></head>
<body class="admin-body">
    <div th:replace="~{admin-layout :: sidebar}"></div>
    
    <div class="admin-main">
        <div th:replace="~{admin-layout :: topbar}"></div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <h2>User Management</h2>
            <button class="btn" onclick="openAddModal()">+ Register User</button>
        </div>

        <div class="admin-table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Branch</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.username}" style="font-weight: 500; color: var(--text-main);"></td>
                        <td th:text="${user.fullName}"></td>
                        <td th:text="${user.email}"></td>
                        <td th:text="${user.branch}"></td>
                        <td th:text="${user.role}"></td>
                        <td>
                            <span th:if="${user.enabled}" class="badge-success"
                                style="background: rgba(48, 209, 88, 0.2); color: #30d158; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">Active</span>
                            <span th:unless="${user.enabled}" class="badge-error"
                                style="background: rgba(255, 59, 48, 0.2); color: #ff3b30; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">Disabled</span>
                        </td>
                        <td>
                            <button type="button" class="btn-secondary"
                                style="font-size: 0.75rem; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; cursor: pointer;"
                                th:attr="onclick=|openEditModal('${user.id}', '${user.username}', '${user.fullName}', '${user.email}', '${user.phoneNumber}', '${user.branch}', '${user.role}', ${user.enabled})|">
                                Edit
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editModal" class="modal">
        <div class="glass-panel" style="position: relative;">
            <button class="close-btn" onclick="closeEditModal()">&times;</button>
            <h2 style="color: var(--text-main); margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
                Edit User Details</h2>

            <form id="editForm" th:action="@{/admin/users/edit}" method="post">
                <input type="hidden" id="editId" name="id" />

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="editUsername" name="username" required="required" />
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="editFullName" name="fullName" required="required" />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail" name="email" required="required" />
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="editPhone" name="phoneNumber" />
                </div>

                <div class="form-group">
                    <label>New Password (Optional)</label>
                    <input type="password" id="editPassword" name="password" placeholder="Leave blank to keep unchanged" />
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Branch</label>
                        <select id="editBranch" name="branch" required="required">
                            <option value="JB">JB</option>
                            <option value="IP">IP</option>
                            <option value="SR">SR</option>
                            <option value="MELAKA">MELAKA</option>
                            <option value="TD">TD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="editRole" name="role" required="required">
                            <option value="ROLE_EVANGELIST">Evangelist</option>
                            <option value="ROLE_ADMIN">Admin</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem; display: flex; align-items: center; gap: 1rem;">
                    <label style="margin-bottom: 0;">Account Enabled</label>
                    <label class="switch">
                        <input type="hidden" name="enabled" value="false">
                        <input type="checkbox" id="editEnabled" name="enabled" value="true">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn" style="width: 100%;">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="addModal" class="modal">
        <div class="glass-panel" style="position: relative;">
            <button class="close-btn" onclick="closeAddModal()">&times;</button>
            <h2 style="color: var(--text-main); margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
                Add New User</h2>

            <form th:action="@{/admin/users/add}" method="post">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" required="required" />
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="fullName" required="required" />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" name="email" required="required" />
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" required="required" />
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Branch</label>
                        <select name="branch" required="required">
                            <option value="JB">JB</option>
                            <option value="IP">IP</option>
                            <option value="SR">SR</option>
                            <option value="MELAKA">MELAKA</option>
                            <option value="TD">TD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select name="role" required="required">
                            <option value="ROLE_EVANGELIST">Evangelist</option>
                            <option value="ROLE_ADMIN">Admin</option>
                        </select>
                    </div>
                </div>

                <input type="hidden" name="enabled" value="true" />

                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn" style="width: 100%;">Add User</button>
                </div>
            </form>
        </div>
    </div>

    <style>
        /* Switch styling */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 24px;
        }
        .switch input[type="checkbox"] {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(255, 255, 255, 0.1);
            transition: .4s;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 16px;
            width: 16px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
        }
        input:checked + .slider {
            background-color: #30d158;
        }
        input:checked + .slider:before {
            transform: translateX(26px);
        }
        .slider.round {
            border-radius: 34px;
        }
        .slider.round:before {
            border-radius: 50%;
        }
    </style>

    <script>
        const editModal = document.getElementById('editModal');
        const addModal = document.getElementById('addModal');

        function openEditModal(id, username, fullName, email, phoneNumber, branch, role, enabled) {
            document.getElementById('editId').value = id;
            document.getElementById('editUsername').value = username;
            document.getElementById('editFullName').value = fullName;
            document.getElementById('editEmail').value = email;
            document.getElementById('editPhone').value = (phoneNumber !== 'null' && phoneNumber != null) ? phoneNumber : '';
            document.getElementById('editBranch').value = branch;
            document.getElementById('editRole').value = role;
            document.getElementById('editEnabled').checked = enabled;
            document.getElementById('editPassword').value = ''; 

            editModal.style.display = "flex";
            setTimeout(() => { editModal.classList.add('show'); }, 10);
        }

        function closeEditModal() {
            editModal.classList.remove('show');
            setTimeout(() => { editModal.style.display = "none"; }, 300); 
        }

        function openAddModal() {
            addModal.style.display = "flex";
            setTimeout(() => { addModal.classList.add('show'); }, 10);
        }

        function closeAddModal() {
            addModal.classList.remove('show');
            setTimeout(() => { addModal.style.display = "none"; }, 300); 
        }

        window.onclick = function (event) {
            if (event.target == editModal) { closeEditModal(); }
            if (event.target == addModal) { closeAddModal(); }
        }
    </script>
</body>
</html>
