<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Entry - Bilingual Soul Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/x-icon" href="/favicon.png">
</head>

<body>
    <div class="glass-nav">
        <h3 style="margin: 0; font-weight: 700; letter-spacing: -0.02em;">Bilingual Soul Tracker</h3>
        <div class="nav-links">
            <a th:href="@{/entries}" class="btn btn-secondary">All Entries</a>
        </div>
    </div>

    <div class="container">
        <h2
            style="color: var(--text-main); margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; text-align: center;">
            Amend Interaction</h2>

        <div class="glass-panel" style="max-width: 600px; margin: 0 auto;">
            <form id="soulForm" th:action="@{/edit/{id}(id=${soul.id})}" th:object="${soul}" method="post">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3 style="margin: 0;">Update Details</h3>
                    <input type="hidden" th:field="*{isPriority}" id="isPriorityInput" />
                    <!-- Check thymeleaf object directly to toggle active class -->
                    <button type="button" class="priority-btn" th:classappend="${soul.isPriority} ? 'active' : ''"
                        id="priorityBtn" title="Mark as Priority">&#9733;</button>
                </div>

                <!-- Hidden inputs for boolean toggle chips -->
                <input type="hidden" th:field="*{isHealed}" id="isHealedInput" />
                <input type="hidden" th:field="*{isPrayed}" id="isPrayedInput" />
                <input type="hidden" th:field="*{isBaptized}" id="isBaptizedInput" />
                <input type="hidden" th:field="*{isPlanted}" id="isPlantedInput" />

                <!-- Visual iOS Toggle Chips -->
                <div class="chip-container">
                    <div class="chip-toggle" data-target="isHealedInput"
                        th:classappend="${soul.isHealed} ? 'active' : ''">Healed</div>
                    <div class="chip-toggle" data-target="isPrayedInput"
                        th:classappend="${soul.isPrayed} ? 'active' : ''">Prayed For</div>
                    <div class="chip-toggle" data-target="isBaptizedInput"
                        th:classappend="${soul.isBaptized} ? 'active' : ''">Baptized</div>
                    <div class="chip-toggle" data-target="isPlantedInput"
                        th:classappend="${soul.isPlanted} ? 'active' : ''">Planted in Church</div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" th:field="*{name}" required="required"
                            placeholder="Who did you speak with?" />
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" th:field="*{location}" required="required"
                            placeholder="Where did this happen?" />
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Phone Number (Optional)</label>
                        <input type="text" th:field="*{phoneNumber}" placeholder="Contact info" />
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{status}" th:disabled="${!isAdmin}">
                            <option th:each="state : ${T(com.outreach.soultracker.entity.SoulStatus).values()}"
                                th:value="${state}" th:text="${state}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Home Church</label>
                        <select th:field="*{homeChurch}">
                            <option value="">-- Select Church --</option>
                            <option value="Selesa Jaya">Selesa Jaya</option>
                            <option value="Pulai">Pulai</option>
                        </select>
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Ministry</label>
                        <select th:field="*{ministry}">
                            <option value="">-- Select Ministry --</option>
                            <option value="4.2.1 Kids Church">4.2.1 Kids Church</option>
                            <option value="Reflect">Reflect</option>
                            <option value="MomentX">MomentX</option>
                            <option value="Marriage For Life">Marriage For Life</option>
                            <option value="Incredibles">Incredibles</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Testimony</label>
                    <textarea th:field="*{testimony}" required="required" rows="4"></textarea>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Next Action / Follow Up</label>
                        <input type="text" th:field="*{nextAction}" placeholder="What needs to happen next?"
                            th:readonly="${!isAdmin}" />
                    </div>

                    <div class="form-group" style="margin-bottom: 2.5rem;">
                        <label>Assigned To</label>
                        <select th:field="*{assignedTo}" th:disabled="${!isAdmin}">
                            <option value="">-- Unassigned --</option>
                            <option th:each="user : ${allUsers}" th:value="${user.id}"
                                th:text="${user.fullName + ' (' + user.branch + ')'}">
                            </option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Created By</label>
                        <input type="text" th:value="${soul.createdBy != null ? soul.createdBy.fullName : 'System'}"
                            readonly="readonly" style="background: rgba(255,255,255,0.05);" />
                    </div>
                </div>

                <!-- Discipleship Progress Panel -->
                <div id="discipleshipPanel"
                    th:style="${soul.isPlanted} ? 'display: block; margin-top: 2rem;' : 'display: none; margin-top: 2rem;'">
                    <div
                        style="border-top: 1px solid var(--glass-border); padding-top: 2rem; margin-top: 1rem; margin-bottom: 1.5rem;">
                        <h3
                            style="margin: 0; color: var(--accent-main); font-size: 1.1rem; letter-spacing: 0.05em; text-transform: uppercase;">
                            Discipleship Progress</h3>
                    </div>

                    <div class="grid-2">
                        <div class="form-group">
                            <label>Visitation Status</label>
                            <select th:field="*{visitationStatus}">
                                <option value="Not Visited">Not Visited</option>
                                <option value="First Visit">First Visit</option>
                                <option value="Regular Visit">Regular Visit</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Visited By</label>
                            <input type="text" th:field="*{visitedBy}" placeholder="Who visited this soul?" />
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Mentor Case Notes</label>
                        <textarea th:field="*{mentorCaseNotes}" rows="4"
                            placeholder="Add timestamped updates on spiritual progress..."></textarea>
                    </div>

                    <div class="form-group">
                        <label
                            style="display: flex; align-items: center; gap: 0.8rem; cursor: pointer; user-select: none;">
                            <input type="checkbox" th:field="*{isServing}"
                                style="width: 20px; height: 20px; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 4px;" />
                            <span>This soul has started serving in ministry</span>
                        </label>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn" style="flex: 2;"
                        onclick="if(navigator.vibrate) navigator.vibrate(20);">Update Record</button>
                    <a th:href="@{/entries}" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script th:inline="javascript">
        // Sync JS toggle chips with hidden thymeleaf boolean inputs
        document.querySelectorAll('.chip-toggle').forEach(chip => {
            chip.addEventListener('click', function () {
                this.classList.toggle('active');
                const targetId = this.getAttribute('data-target');
                const hiddenInput = document.getElementById(targetId);
                // Toggle the boolean string value
                if (hiddenInput) {
                    hiddenInput.value = this.classList.contains('active') ? 'true' : 'false';
                }

                // Toggle Discipleship Panel visibility if 'Planted in Church' is clicked
                if (targetId === 'isPlantedInput') {
                    const panel = document.getElementById('discipleshipPanel');
                    if (this.classList.contains('active')) {
                        panel.style.display = 'block';
                    } else {
                        panel.style.display = 'none';
                    }
                }
            });
        });

        // Sync Priority Star
        const priorityBtn = document.getElementById('priorityBtn');
        const priorityInput = document.getElementById('isPriorityInput');

        priorityBtn.addEventListener('click', function () {
            this.classList.toggle('active');
            if (priorityInput) {
                priorityInput.value = this.classList.contains('active') ? 'true' : 'false';
            }
        });
    </script>
</body>

</html>
