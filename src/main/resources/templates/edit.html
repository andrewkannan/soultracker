<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Entry - Bilingual Soul Tracker</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/x-icon" href="/favicon.png">
</head>

<body>
    <div class="glass-nav">
        <h3 style="margin: 0; font-weight: 700; letter-spacing: -0.02em;">Bilingual Soul Tracker</h3>
        <div class="nav-links">
            <a th:href="@{/entries}" class="btn btn-secondary">All Entries</a>
        </div>
    </div>

    <div class="container">
        <h2
            style="color: var(--text-main); margin-bottom: 2rem; max-width: 600px; margin-left: auto; margin-right: auto; text-align: center;">
            Amend Interaction</h2>

        <div class="glass-panel" style="max-width: 600px; margin: 0 auto;">
            <form id="soulForm" th:action="@{/edit/{id}(id=${soul.id})}" th:object="${soul}" method="post">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                    <h3 style="margin: 0;">Update Details</h3>
                    <input type="hidden" th:field="*{isPriority}" id="isPriorityInput" />
                    <!-- Check thymeleaf object directly to toggle active class -->
                    <button type="button" class="priority-btn" th:classappend="${soul.isPriority} ? 'active' : ''"
                        id="priorityBtn" title="Mark as Priority">&#9733;</button>
                </div>

                <!-- Hidden inputs for boolean toggle chips -->
                <input type="hidden" th:field="*{isHealed}" id="isHealedInput" />
                <input type="hidden" th:field="*{isPrayed}" id="isPrayedInput" />
                <input type="hidden" th:field="*{isBaptized}" id="isBaptizedInput" />
                <input type="hidden" th:field="*{isPlanted}" id="isPlantedInput" />

                <!-- Visual iOS Toggle Chips -->
                <div class="chip-container">
                    <div class="chip-toggle" data-target="isHealedInput"
                        th:classappend="${soul.isHealed} ? 'active' : ''">Healed</div>
                    <div class="chip-toggle" data-target="isPrayedInput"
                        th:classappend="${soul.isPrayed} ? 'active' : ''">Prayed For</div>
                    <div class="chip-toggle" data-target="isBaptizedInput"
                        th:classappend="${soul.isBaptized} ? 'active' : ''">Baptized</div>
                    <div class="chip-toggle" data-target="isPlantedInput"
                        th:classappend="${soul.isPlanted} ? 'active' : ''">Planted in Church</div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" th:field="*{name}" required="required"
                            placeholder="Who did you speak with?" />
                    </div>

                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" th:field="*{location}" required="required"
                            placeholder="Where did this happen?" />
                    </div>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Phone Number (Optional)</label>
                        <input type="text" th:field="*{phoneNumber}" placeholder="Contact info" />
                    </div>

                    <div class="form-group">
                        <label>Status</label>
                        <select th:field="*{status}" th:disabled="${!isAdmin}">
                            <option th:each="state : ${T(com.outreach.soultracker.entity.SoulStatus).values()}"
                                th:value="${state}" th:text="${state}">
                            </option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Testimony</label>
                    <textarea th:field="*{testimony}" required="required" rows="4"></textarea>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Next Action / Follow Up</label>
                        <input type="text" th:field="*{nextAction}" placeholder="What needs to happen next?"
                            th:readonly="${!isAdmin}" />
                    </div>

                    <div class="form-group" style="margin-bottom: 2.5rem;">
                        <label>Assigned To</label>
                        <select th:field="*{assignedTo}" th:disabled="${!isAdmin}">
                            <option value="">-- Unassigned --</option>
                            <option th:each="user : ${allUsers}" th:value="${user.id}"
                                th:text="${user.fullName + ' (' + user.branch + ')'}">
                            </option>
                        </select>
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <button type="submit" class="btn" style="flex: 2;"
                        onclick="if(navigator.vibrate) navigator.vibrate(20);">Update Record</button>
                    <a th:href="@{/entries}" class="btn btn-secondary" style="flex: 1; text-align: center;">Cancel</a>
                </div>
            </form>
        </div>
    </div>
    <script th:inline="javascript">
        // Sync JS toggle chips with hidden thymeleaf boolean inputs
        document.querySelectorAll('.chip-toggle').forEach(chip => {
            chip.addEventListener('click', function () {
                this.classList.toggle('active');
                const targetId = this.getAttribute('data-target');
                const hiddenInput = document.getElementById(targetId);
                // Toggle the boolean string value
                if (hiddenInput) {
                    hiddenInput.value = this.classList.contains('active') ? 'true' : 'false';
                }
            });
        });

        // Sync Priority Star
        const priorityBtn = document.getElementById('priorityBtn');
        const priorityInput = document.getElementById('isPriorityInput');

        priorityBtn.addEventListener('click', function () {
            this.classList.toggle('active');
            if (priorityInput) {
                priorityInput.value = this.classList.contains('active') ? 'true' : 'false';
            }
        });
    </script>
</body>

</html>
