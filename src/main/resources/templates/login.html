<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reach | Centralised Soul Winning System</title>
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://reach.cccjbbilingual.com/">
    <meta property="og:title" content="Reach | Centralised Soul Winning System">
    <meta property="og:description" content="A professional platform for outreach and new comer management system.">
    <meta property="og:image" content="https://reach.cccjbbilingual.com/og-1.png?v=2">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:url" content="https://reach.cccjbbilingual.com/">
    <meta name="twitter:title" content="Reach | Centralised Soul Winning System">
    <meta name="twitter:description" content="A professional platform for outreach and new comer management system.">
    <meta name="twitter:image" content="https://reach.cccjbbilingual.com/og-1.png?v=2">

    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/x-icon" href="/favicon.png">
</head>

<body>
    <div class="glass-nav">
        <h3 style="margin: 0; font-weight: 700; letter-spacing: -0.02em;">Reach.</h3>
        <a th:href="@{/}" class="btn btn-secondary" style="font-size: 0.85rem; padding: 0.5rem 1rem;">Back</a>
    </div>

    <div class="container center-content">
        <div class="glass-panel" style="max-width: 400px; width: 100%;">
            <h2 style="color: var(--text-main); margin-bottom: 1.5rem;">Log in to Reach.</h2>

            <div th:if="${param.error}" style="color: #ff3b30; margin-bottom: 1.5rem; font-size: 0.9rem;">
                Invalid credentials. Please try again.
            </div>
            <div th:if="${param.logout}" style="color: #34c759; margin-bottom: 1.5rem; font-size: 0.9rem;">
                You have been securely logged out.
            </div>
            <div th:if="${param.registered}" style="background: rgba(37, 211, 102, 0.1); border: 1px solid rgba(37, 211, 102, 0.3); color: #25D366; padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: 0.95rem; text-align: center;">
                <strong>Welcome to Reach! 🎉</strong><br/>
                Your account has been successfully created.<br/>
                Log in below to access your dashboard.
            </div>

            <form th:action="@{/login}" method="post" id="loginForm">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" name="username" id="username" required="required"
                        placeholder="Enter your username" />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" id="password" required="required"
                        placeholder="Enter your password" />
                </div>

                <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-bottom: 2rem;">
                    <input type="checkbox" name="remember-me" id="remember-me" style="width: auto;">
                    <label for="remember-me" style="margin-bottom: 0; cursor: pointer;">Stay logged in</label>
                </div>

                <button type="submit" class="btn" style="width: 100%; border-radius: 20px;"
                    onclick="if(navigator.vibrate) navigator.vibrate(20);">Log in</button>
                    
                <div style="margin: 1.5rem 0; display: flex; align-items: center; gap: 1rem;">
                    <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
                    <span style="color: var(--text-muted); font-size: 0.8rem;">OR</span>
                    <div style="flex: 1; height: 1px; background: var(--glass-border);"></div>
                </div>

                <div style="text-align: center; font-size: 0.85rem;">
                    First time user? <a th:href="@{/signup}" style="color: var(--text-main); font-weight: 600; text-decoration: none;">Create an account</a>
                </div>
            </form>


        <footer class="app-footer">Powered by CCC JB Bilingual</footer>
</body>

</html>
