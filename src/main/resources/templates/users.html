<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="https://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - Reach.</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="icon" type="image/x-icon" href="/favicon.png">
</head>

<body>
    <div class="glass-nav">
        <h3 style="margin: 0; font-weight: 700; letter-spacing: -0.02em;">Reach.</h3>
        <div class="nav-links">
            <a th:href="@{/adduser}" class="btn">+ Register User</a>
            <a th:href="@{/}" class="btn btn-secondary">Dashboard</a>
        </div>
    </div>

    <div class="container" style="max-width: 1400px;">
        <h2 style="color: var(--text-main); margin-bottom: 2rem;">User Management</h2>

        <div class="glass-table-container">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Full Name</th>
                        <th>Email</th>
                        <th>Phone</th>
                        <th>Branch</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}">1</td>
                        <td th:text="${user.username}" style="font-weight: 500; color: var(--text-main);">jdoe</td>
                        <td th:text="${user.fullName}">John Doe</td>
                        <td th:text="${user.email}">jdoe@example.com</td>
                        <td th:text="${user.phoneNumber}">+1234567890</td>
                        <td th:text="${user.branch}">JB</td>
                        <td th:text="${user.role}">ROLE_EVANGELIST</td>
                        <td>
                            <span th:if="${user.enabled}" class="badge-success"
                                style="background: rgba(48, 209, 88, 0.2); color: #30d158; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">Active</span>
                            <span th:unless="${user.enabled}" class="badge-error"
                                style="background: rgba(255, 59, 48, 0.2); color: #ff3b30; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem;">Disabled</span>
                        </td>
                        <td>
                            <button type="button" class="btn btn-secondary"
                                style="font-size: 0.75rem; padding: 0.4rem 0.8rem;"
                                th:attr="onclick=|openEditModal('${user.id}', '${user.username}', '${user.fullName}', '${user.email}', '${user.phoneNumber}', '${user.branch}', '${user.role}', ${user.enabled})|">
                                Edit
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div id="editModal" class="modal">
        <div class="glass-panel" style="position: relative;">
            <button class="close-btn" onclick="closeEditModal()">&times;</button>
            <h2
                style="color: var(--text-main); margin-bottom: 2rem; border-bottom: 1px solid var(--glass-border); padding-bottom: 1rem;">
                Edit User Details</h2>

            <form id="editForm" th:action="@{/edituser}" method="post">
                <input type="hidden" id="editId" name="id" />

                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="editUsername" name="username" required="required" />
                </div>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="editFullName" name="fullName" required="required" />
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="editEmail" name="email" required="required" />
                </div>

                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" id="editPhone" name="phoneNumber" />
                </div>

                <div class="form-group">
                    <label>New Password (Optional)</label>
                    <input type="password" id="editPassword" name="password"
                        placeholder="Leave blank to keep unchanged" />
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Branch</label>
                        <select id="editBranch" name="branch" required="required">
                            <option value="JB">JB</option>
                            <option value="IP">IP</option>
                            <option value="SR">SR</option>
                            <option value="MELAKA">MELAKA</option>
                            <option value="TD">TD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Role</label>
                        <select id="editRole" name="role" required="required">
                            <option value="ROLE_EVANGELIST">Evangelist</option>
                            <option value="ROLE_ADMIN">Admin</option>
                        </select>
                    </div>
                </div>

                <div class="form-group" style="margin-top: 1rem; display: flex; align-items: center; gap: 1rem;">
                    <label style="margin-bottom: 0;">Account Enabled</label>
                    <label class="switch">
                        <input type="hidden" name="enabled" value="false">
                        <input type="checkbox" id="editEnabled" name="enabled" value="true">
                        <span class="slider round"></span>
                    </label>
                </div>

                <div style="margin-top: 1.5rem;">
                    <button type="submit" class="btn" style="width: 100%;"
                        onclick="if(navigator.vibrate) navigator.vibrate(20);">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script th:inline="javascript">
        const modal = document.getElementById('editModal');

        function openEditModal(id, username, fullName, email, phoneNumber, branch, role, enabled) {
            document.getElementById('editId').value = id;
            document.getElementById('editUsername').value = username;
            document.getElementById('editFullName').value = fullName;
            document.getElementById('editEmail').value = email;
            
            // Handle null phone numbers safely
            document.getElementById('editPhone').value = (phoneNumber !== 'null' && phoneNumber != null) ? phoneNumber : '';
            
            document.getElementById('editBranch').value = branch;
            document.getElementById('editRole').value = role;
            document.getElementById('editEnabled').checked = enabled;
            document.getElementById('editPassword').value = ''; // Ensure blank on open

            modal.style.display = "flex";
            // Tiny timeout to allow display:flex to apply before adding class for transition
            setTimeout(() => {
                modal.classList.add('show');
            }, 10);
        }

        function closeEditModal() {
            modal.classList.remove('show');
            setTimeout(() => {
                modal.style.display = "none";
            }, 300); // match CSS transition time
        }

        // Close it when user clicks outside the glass panel
        window.onclick = function (event) {
            if (event.target == modal) {
                closeEditModal();
            }
        }
    </script>
</body>

</html>
